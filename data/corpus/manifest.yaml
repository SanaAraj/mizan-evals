# Pinned Arabic Wikipedia revisions for the retrieval corpus.
#
# Each entry pins one article to an EXACT revision id. scripts/build_corpus.py
# fetches the plaintext extract for the (canonical) title and refuses to build if
# the live revision no longer matches the pinned `revid` - so the committed
# corpus (data/corpus/arwiki.jsonl) is reproducible from a known source state.
#
# Titles are the canonical (post-redirect) article titles. To add or re-pin an
# article, set `revid` to the current `lastrevid` from the API and rebuild.
#
# Source: Arabic Wikipedia (https://ar.wikipedia.org), text under CC BY-SA 4.0.
# See README.md in this folder for attribution and rebuild instructions.

source: "Arabic Wikipedia"
license: "CC BY-SA 4.0"
